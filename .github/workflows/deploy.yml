name: Deploy Blog

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0          # full history for .Lastmod

      - uses: actions/setup-go@v6
        with:
          go-version: "stable"    # required for Hugo Modules

      - name: Setup Hugo (Extended)
        uses: peaceiris/actions-hugo@v3.2.1
        with:
          hugo-version: latest
          extended: true          # Congo uses SCSS

      - name: Build
        run: hugo --minify --baseURL "https://chrisvoo.github.io/" --buildFuture

      - uses: actions/upload-pages-artifact@v5
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v5
        id: deployment
